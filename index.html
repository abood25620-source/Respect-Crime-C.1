<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Respect Aura C.1</title>

    <style>
        body {
            margin: 0;
            font-family: Tahoma, Arial;
            background: #0e0e0e;
            color: white;
        }

        .top-line {
            height: 6px;
            background: linear-gradient(90deg, #6a00ff, #b084ff);
        }

        /* ===== الهيدر ===== */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background: #111;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            width: 55px;
        }

        .logo span {
            font-size: 20px;
            font-weight: bold;
        }

        .home-btn {
            text-decoration: none;
            color: white;
            background: #6a00ff;
            padding: 10px 22px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .home-btn:hover {
            background: #8a2bff;
            transform: scale(1.05);
        }

        header {
            text-align: center;
            padding: 60px 20px;
        }

        header h1 {
            font-size: 42px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .btn {
            background: #6a00ff;
            padding: 20px 40px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-size: 20px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.08);
            background: #8a2bff;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #111;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="top-line"></div>

<nav class="navbar">
    <div class="logo">
        <img src="images/Logo.png" alt="Logo">
        <span>Respect Aura C.1</span>
    </div>

    <!-- زر الهوم (هنا أنت في الهوم، بس نخليه ثابت للتناسق) -->
    <a class="home-btn" href="index.html">Home</a>
</nav>

<header>
    <h1>Respect Aura C.1</h1>
    <p>حياكم الله في سيرفر Respect Aura C.1 المتخصص في الرول بلاي نحاول جاهدين تقديم افضل تجربه للرول بلاي في الشرق الاوسط انضم الينا الان و عيش حياتك كما تريد</p>

    <div class="buttons">
        <a class="btn" href="https://your-store-link.com" target="_blank">🛒 المتجر</a>
        <a class="btn" href="rules.html">📜 القوانين</a>
        <a class="btn" href="https://discord.gg/UNEkSartvu" target="_blank">💬 الدسكورد</a>
    </div>
</header>

<footer>
    © Respect Crime C.1
</footer>

</body>
</html>
